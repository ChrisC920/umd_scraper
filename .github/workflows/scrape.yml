name: Scrape UMD Nutrition

on:
  schedule:
    - cron: "0 9 * * *"  # 09:00 UTC = 05:00 ET
  workflow_dispatch:
    inputs:
      days_ahead:
        description: "Days ahead to scrape"
        required: false
        default: "2"
      start_date:
        description: "ISO date YYYY-MM-DD (default: today). Use to backfill or hit Wayback snapshots."
        required: false
        default: ""
      base_url:
        description: "Override base URL (e.g. Wayback prefix). Empty = nutrition.umd.edu."
        required: false
        default: ""
      min_interval:
        description: "Seconds between requests (raise for Wayback, e.g. 3.0)"
        required: false
        default: "0.5"
      skip_labels:
        description: "Skip label.aspx fetches (Wayback rarely archives them)"
        type: boolean
        required: false
        default: false

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SCRAPER_BASE_URL: ${{ inputs.base_url }}
        run: |
          ARGS=(--days-ahead "${{ inputs.days_ahead || '2' }}")
          ARGS+=(--min-interval "${{ inputs.min_interval || '0.5' }}")
          if [ -n "${{ inputs.start_date }}" ]; then
            ARGS+=(--start-date "${{ inputs.start_date }}")
          fi
          if [ "${{ inputs.skip_labels }}" = "true" ]; then
            ARGS+=(--skip-labels)
          fi
          python -m scraper.main "${ARGS[@]}"
