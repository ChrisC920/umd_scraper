name: Scrape UMD Nutrition

on:
  schedule:
    - cron: "0 9 * * *"  # 09:00 UTC = 05:00 ET
  workflow_dispatch:
    inputs:
      days_ahead:
        description: "Days ahead to scrape"
        required: false
        default: "2"

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m scraper.main --days-ahead ${{ inputs.days_ahead || '2' }}
